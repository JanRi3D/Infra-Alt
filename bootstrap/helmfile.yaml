---
helmDefaults:
  wait: true
  waitForJobs: true
  timeout: 600

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.3
    values:
      - ./templates/values.yaml.gotmpl

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.5.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - kube-system/cilium

  - name: onepassword
    namespace: external-secrets
    chart: oci://ghcr.io/bjw-s-labs/helm/app-template
    version: 5.0.0
    values:
      - ./templates/values.yaml.gotmpl
    hooks:
      - command: bash
        args:
          - -c
          - until kubectl get crd clustersecretstores.external-secrets.io &>/dev/null; do sleep 5; done
        events:
          - postsync
        showlogs: true
      - command: kubectl
        args:
          - apply
          - --server-side
          - --field-manager=kustomize-controller
          - --filename=../kubernetes/apps/external-secrets/onepassword/app/clustersecretstore.yaml
        events:
          - postsync
    needs:
      - external-secrets/external-secrets

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.2
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - external-secrets/onepassword

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.49.0
    values:
      - ./templates/values.yaml.gotmpl
    createNamespace: true
    needs: ["cert-manager/cert-manager"]

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.49.0
    needs: ["flux-system/flux-operator"]
    values:
      - ./templates/values.yaml.gotmpl